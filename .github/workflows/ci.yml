name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Ensure .env is not tracked
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error::.env is tracked in git — remove it and add it to .gitignore" >&2
            exit 1
          fi
      - name: pre-commit
        run: pipx run pre-commit run --all-files --show-diff-on-failure
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest --cov --cov-report=xml
      # Diff coverage gates PRs only. On a push to main, github.base_ref is empty
      # and origin/main == HEAD, so the diff would be empty and the gate a no-op —
      # gate the PR, where the base branch is a real, different ref.
      - name: Diff coverage
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_REF: ${{ github.base_ref }}
        run: uv run diff-cover coverage.xml --compare-branch="origin/$BASE_REF" --fail-under=100
